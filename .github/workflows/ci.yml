name: ToolCase CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── P0: Compile all Python files (catches from __future__ placement, real syntax errors) ──
      - name: Compile all Python files (py_compile — strict)
        run: |
          python -c "
          import py_compile, sys
          from pathlib import Path
          errors = []
          for p in Path('.').rglob('*.py'):
              parts = set(p.parts)
              if parts & {'__pycache__', '.git', '.venv', 'venv', 'node_modules', 'build', 'dist', '.rsi_backups'}:
                  continue
              try:
                  py_compile.compile(str(p), doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(f'{p}: {e}')
          if errors:
              for e in errors:
                  print(f'FAIL: {e}', file=sys.stderr)
              sys.exit(1)
          print('All Python files compile successfully')
          "

      # ── Syntax check (fast AST + compile double-check) ──
      - name: Syntax check all Python files
        run: python3 check_syntax.py

      # ── Version consistency across ALL sources ──
      - name: Version consistency check
        run: python3 scripts/check_version_consistency.py

      # ── Dry-run self-improve (smoke test — warnings are OK) ──
      - name: Dry-run self-improve
        run: |
          python3 self_improve_loop.py . --cycles 1 --dry-run --json --no-report > /tmp/si_output.json 2>&1
          EXIT=$?
          STATUS=$(python3 -c "import json; d=json.load(open('/tmp/si_output.json')); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
          echo "Self-improve status: $STATUS (exit $EXIT)"
          # Only fail on hard failures, not warnings
          if [ "$STATUS" = "failed" ] || [ "$STATUS" = "blocked" ] || [ "$STATUS" = "rolled_back" ]; then
            echo "FAIL: self-improve reported $STATUS"
            exit 1
          fi
          echo "OK: self-improve smoke test passed (status=$STATUS)"

      # ── P0: Build wheel and verify install ──
      - name: Install build deps
        run: pip install build
      - name: Build wheel
        run: python -m build --wheel
      - name: Install wheel in clean venv
        run: |
          python -m venv /tmp/test_toolcase
          /tmp/test_toolcase/bin/pip install dist/toolcase-*.whl
      - name: Verify CLI starts (--version)
        run: /tmp/test_toolcase/bin/toolcase --version
      - name: Verify tool listing (--list-tools)
        run: /tmp/test_toolcase/bin/toolcase --list-tools
      - name: Verify install check (--verify-install)
        run: /tmp/test_toolcase/bin/toolcase --verify-install
      - name: Verify pip check
        run: /tmp/test_toolcase/bin/pip check
      - name: Verify wheel has data files
        run: |
          python -c "
          import zipfile, sys
          with zipfile.ZipFile('dist/toolcase-*.whl') as z:
              names = z.namelist()
          required = ['tools_config.json', 'manifest.json', 'SKILL.md', 'dashboard.html']
          missing = [f for f in required if not any(f in n for n in names)]
          if missing:
              print(f'MISSING from wheel: {missing}')
              sys.exit(1)
          print('All required data files in wheel')
          "

      # ── Run tests ──
      - name: Install test dependencies
        run: pip install pytest pyyaml
      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
