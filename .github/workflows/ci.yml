name: ToolCase CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify install
        run: python3 improve.py --verify-install
      - name: Syntax check all Python files
        run: python3 check_syntax.py
      - name: Version consistency check
        run: python3 scripts/check_version_consistency.py
      - name: Dry-run self-improve
        run: python3 recursive_self_improve.py . --dry-run --cycles 1 --json --no-report
      - name: Install test dependencies
        run: pip install pytest pyyaml
      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
