name: ToolCase CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  verify:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── P0: Compile all Python files ──
      - name: Compile all Python files (py_compile — strict)
        shell: bash
        run: |
          python -c "
          import py_compile, sys
          from pathlib import Path
          errors = []
          skip = {'__pycache__', '.git', '.venv', 'venv', 'node_modules', 'build', 'dist', '.rsi_backups'}
          for p in Path('.').rglob('*.py'):
              parts = set(p.parts)
              if parts & skip:
                  continue
              try:
                  py_compile.compile(str(p), doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(f'{p}: {e}')
          if errors:
              for e in errors:
                  print(f'FAIL: {e}', file=sys.stderr)
              sys.exit(1)
          print('All Python files compile successfully')
          "

      # ── Syntax check ──
      - name: Syntax check all Python files
        run: python check_syntax.py

      # ── Version consistency ──
      - name: Version consistency check
        run: python scripts/check_version_consistency.py

      # ── Dry-run self-improve smoke test ──
      - name: Dry-run self-improve
        shell: bash
        run: |
          set +e
          python self_improve_loop.py . --cycles 1 --dry-run --json --no-report > /tmp/si_output.json
          EXIT=$?
          set -e
          STATUS=$(python -c "import json; print(json.load(open('/tmp/si_output.json')).get('status','unknown'))" 2>/dev/null || echo "unknown")
          echo "Self-improve status: $STATUS (exit $EXIT)"
          if [ "$STATUS" = "failed" ] || [ "$STATUS" = "blocked" ] || [ "$STATUS" = "rolled_back" ]; then
            echo "FAIL: self-improve reported $STATUS"
            exit 1
          fi
          echo "OK: self-improve smoke test passed"

      # ── Install test deps + coverage ──
      - name: Install test dependencies
        run: pip install pytest pyyaml pytest-cov

      # ── Run tests with coverage ──
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=. --cov-branch --cov-report=term-missing \
            --cov-fail-under=70 \
            --ignore=tests/fixtures

      # ── Build wheel + sdist ──
      - name: Install build deps
        run: pip install build twine
      - name: Build wheel and sdist
        run: python -m build --sdist --wheel
      - name: Check distribution with twine
        run: python -m twine check dist/*

      # ── Install wheel in clean venv and verify ──
      - name: Install wheel in clean venv
        shell: bash
        run: |
          python -m venv /tmp/test_toolcase
          /tmp/test_toolcase/bin/pip install dist/toolcase-*.whl
      - name: Verify CLI (--version)
        shell: bash
        run: /tmp/test_toolcase/bin/toolcase --version
      - name: Verify CLI (--list-tools)
        shell: bash
        run: /tmp/test_toolcase/bin/toolcase --list-tools
      - name: Verify CLI (--verify-install)
        shell: bash
        run: /tmp/test_toolcase/bin/toolcase --verify-install
      - name: Verify pip check
        shell: bash
        run: /tmp/test_toolcase/bin/pip check
      - name: Verify wheel has data files
        run: |
          python -c "
          from pathlib import Path
          import zipfile, sys
          wheel = next(Path('dist').glob('toolcase-*.whl'))
          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
          required = ['tools_config.json', 'manifest.json', 'SKILL.md', 'dashboard.html']
          missing = [f for f in required if not any(f in n for n in names)]
          if missing:
              print(f'MISSING from wheel: {missing}')
              sys.exit(1)
          print('All required data files in wheel')
          "
