name: ToolCase CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  verify:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── P0: Compile all Python files ──
      - name: Compile all Python files (py_compile — strict)
        shell: pwsh
        run: |
          python -c "
          import py_compile, sys
          from pathlib import Path
          errors = []
          skip = {'__pycache__', '.git', '.venv', 'venv', 'node_modules', 'build', 'dist', '.rsi_backups'}
          for p in Path('.').rglob('*.py'):
              parts = set(p.parts)
              if parts & skip:
                  continue
              try:
                  py_compile.compile(str(p), doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(f'{p}: {e}')
          if errors:
              for e in errors:
                  print(f'FAIL: {e}', file=sys.stderr)
              sys.exit(1)
          print('All Python files compile successfully')
          "

      # ── Syntax check ──
      - name: Syntax check all Python files
        run: python check_syntax.py

      # ── Version consistency ──
      - name: Version consistency check
        run: python scripts/check_version_consistency.py

      # ── Dry-run self-improve smoke test ──
      - name: Dry-run self-improve
        shell: pwsh
        run: |
          $outfile = Join-Path $env:TEMP "si_output.json"
          python self_improve_loop.py . --cycles 1 --dry-run --json --no-report 2>&1 | Out-File -FilePath $outfile -Encoding utf8
          $EXIT = $LASTEXITCODE
          if ($EXIT -ne 0) {
            Write-Host "FAIL: self-improve exited $EXIT"
            exit $EXIT
          }
          try {
            $json = Get-Content $outfile -Raw | ConvertFrom-Json
            $STATUS = $json.status
          } catch {
            Write-Host "FAIL: self-improve produced invalid JSON or crashed"
            exit 1
          }
          Write-Host "Self-improve status: $STATUS (exit $EXIT)"
          if ($STATUS -eq "failed" -or $STATUS -eq "blocked" -or $STATUS -eq "rolled_back" -or $STATUS -eq "unknown") {
            Write-Host "FAIL: self-improve reported $STATUS"
            exit 1
          }
          Write-Host "OK: self-improve smoke test passed"

      # ── Install test deps + coverage ──
      - name: Install test dependencies
        run: pip install pytest pyyaml pytest-cov

      # ── Run tests with coverage ──
      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-branch --cov-report=term-missing --cov-fail-under=70 --ignore=tests/fixtures

      # ── Build wheel + sdist ──
      - name: Install build deps
        run: pip install build twine
      - name: Build wheel and sdist
        run: python -m build --sdist --wheel
      - name: Check distribution with twine
        run: python -m twine check dist/*

      # ── Install wheel in clean venv and verify (cross-platform) ──
      - name: Install wheel in clean venv
        run: |
          python -m venv test_venv
          .	est_venv\Scripts\Activate.ps1
          pip install dist/toolcase-*.whl
        shell: pwsh
      - name: Verify CLI (--version)
        run: .	est_venv\Scripts	oolcase.exe --version
        shell: pwsh
      - name: Verify CLI (--list-tools)
        run: .	est_venv\Scripts	oolcase.exe --list-tools
        shell: pwsh
      - name: Verify CLI (--verify-install)
        run: .	est_venv\Scripts	oolcase.exe --verify-install
        shell: pwsh
      - name: Verify pip check
        run: .	est_venv\Scripts\pip.exe check
        shell: pwsh
      - name: Verify wheel has data files
        run: |
          python -c "
          from pathlib import Path
          import zipfile, sys
          wheel = next(Path('dist').glob('toolcase-*.whl'))
          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
          required = ['tools_config.json', 'manifest.json', 'SKILL.md', 'dashboard.html']
          missing = [f for f in required if not any(f in n for n in names)]
          if missing:
              print(f'MISSING from wheel: {missing}')
              sys.exit(1)
          print('All required data files in wheel')
          "
