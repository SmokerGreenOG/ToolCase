<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolCase v5.4.0 — Dashboard</title>
<style>
  /* ── Reset & Theme ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0718;
    --card: #120b24;
    --card-hover: #1a1030;
    --border: rgba(168, 85, 247, 0.35);
    --primary: #a855f7;
    --secondary: #c084fc;
    --accent-pink: #ec4899;
    --accent-cyan: #06b6d4;
    --text: #f1e8ff;
    --text-muted: #a78bca;
    --text-dim: #6b5b8a;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  }
  html { font-size: 15px; scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  a { color: var(--secondary); text-decoration: none; }
  a:hover { color: var(--primary); text-decoration: underline; }

  /* ── Header ────────────────────────────────────── */
  .header {
    max-width: 1400px; margin: 0 auto 28px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo {
    width: 48px; height: 48px; border-radius: var(--radius);
    background: linear-gradient(135deg, var(--primary), var(--accent-pink));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; color: #fff;
  }
  .header h1 { font-size: 1.7rem; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .sub { color: var(--text-muted); font-size: 0.85rem; margin-top: 2px; }
  .header-right { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  /* ── Stats Bar ──────────────────────────────────── */
  .stats-bar {
    max-width: 1400px; margin: 0 auto 28px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 16px; text-align: center; transition: all .2s;
  }
  .stat-card:hover { border-color: var(--primary); background: var(--card-hover); transform: translateY(-1px); }
  .stat-card .num { font-size: 1.6rem; font-weight: 700; }
  .stat-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; }
  .stat-card.green .num { color: var(--green); }
  .stat-card.yellow .num { color: var(--yellow); }
  .stat-card.red .num { color: var(--red); }
  .stat-card.purple .num { color: var(--primary); }
  .stat-card.cyan .num { color: var(--accent-cyan); }
  .stat-card.pink .num { color: var(--accent-pink); }

  /* ── Controls ───────────────────────────────────── */
  .controls {
    max-width: 1400px; margin: 0 auto 24px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .controls input, .controls select {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); padding: 10px 14px; font-size: 0.88rem;
    outline: none; transition: border-color .2s;
  }
  .controls input:focus, .controls select:focus { border-color: var(--primary); }
  .controls input::placeholder { color: var(--text-dim); }
  .controls input { flex: 1; min-width: 200px; max-width: 360px; }
  .controls select { cursor: pointer; min-width: 140px; }
  .controls .badge-count { color: var(--text-muted); font-size: 0.82rem; margin-left: auto; }

  /* ── Category Cards ─────────────────────────────── */
  .categories { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
  .cat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; transition: border-color .2s;
  }
  .cat-card:hover { border-color: rgba(168, 85, 247, 0.55); }
  .cat-header {
    display: flex; align-items: center; gap: 12px; padding: 16px 20px;
    cursor: pointer; user-select: none; transition: background .15s;
  }
  .cat-header:hover { background: rgba(168, 85, 247, 0.06); }
  .cat-header .icon { font-size: 1.3rem; width: 32px; text-align: center; }
  .cat-header .name { font-size: 1.05rem; font-weight: 600; flex: 1; }
  .cat-header .desc { font-size: 0.78rem; color: var(--text-muted); flex: 1; max-width: 340px; }
  .cat-header .count { font-size: 0.78rem; color: var(--text-dim); background: rgba(168,85,247,.1); padding: 2px 10px; border-radius: 99px; }
  .cat-header .arrow { color: var(--text-dim); font-size: 0.85rem; transition: transform .25s; }
  .cat-header.collapsed .arrow { transform: rotate(-90deg); }
  .cat-body { padding: 0 20px 20px; overflow: hidden; transition: max-height .3s ease; }
  .cat-card.collapsed .cat-body { max-height: 0 !important; padding: 0 20px; }

  /* ── Tool Table ─────────────────────────────────── */
  .tool-table {
    width: 100%; border-collapse: collapse;
    font-size: 0.85rem;
  }
  .tool-table th {
    text-align: left; padding: 8px 10px;
    color: var(--text-dim); font-weight: 500; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: .04em;
    border-bottom: 1px solid var(--border);
  }
  .tool-table td { padding: 10px; border-bottom: 1px solid rgba(168,85,247,.12); vertical-align: middle; }
  .tool-table tr:last-child td { border-bottom: none; }
  .tool-table tr:hover td { background: rgba(168,85,247,.04); }

  .tool-number { width: 48px; min-width: 48px; text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 0.8rem; }
  .tool-name { min-width: 180px; white-space: normal; word-break: normal; font-weight: 500; }
  .tool-name code { font-family: var(--mono); font-size: 0.82rem; color: var(--secondary); }
  .tool-type { font-size: 0.75rem; color: var(--text-muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: .03em; min-width: 60px; }
  .tool-desc { color: var(--text-muted); line-height: 1.45; }
  .tool-tags { display: flex; gap: 4px; flex-wrap: wrap; min-width: 100px; }

  /* ── Badges ─────────────────────────────────────── */
  .badge {
    display: inline-block; font-size: 0.68rem; font-weight: 600;
    padding: 2px 8px; border-radius: 99px; letter-spacing: .03em;
    text-transform: uppercase; white-space: nowrap;
  }
  .risk-low { background: rgba(34,197,94,.15); color: var(--green); }
  .risk-medium { background: rgba(234,179,8,.15); color: var(--yellow); }
  .risk-high { background: rgba(239,68,68,.15); color: var(--red); }

  .tag-core { background: rgba(168,85,247,.15); color: var(--primary); }
  .tag-safe { background: rgba(6,182,212,.15); color: var(--accent-cyan); }
  .tag-experimental { background: rgba(236,72,153,.15); color: var(--accent-pink); }
  .tag-python { background: rgba(55,65,81,.15); color: #94a3b8; }
  .tag-node { background: rgba(34,211,102,.1); color: #22c55e; }
  .tag-frontend { background: rgba(59,130,246,.15); color: #60a5fa; }
  .tag-backend { background: rgba(139,92,246,.15); color: #a78bfa; }
  .tag-security { background: rgba(239,68,68,.12); color: #f87171; }
  .tag-filesystem { background: rgba(251,146,60,.12); color: #fb923c; }
  .tag-terminal { background: rgba(34,211,102,.12); color: #4ade80; }
  .tag-build { background: rgba(6,182,212,.12); color: #22d3ee; }
  .tag-recovery { background: rgba(52,211,153,.12); color: #34d399; }
  .tag-memory { background: rgba(168,85,247,.12); color: #c084fc; }
  .tag-skill { background: rgba(244,114,182,.12); color: #f472b6; }
  .tag-readonly { background: rgba(148,163,184,.12); color: #94a3b8; }
  .tag-writes-files { background: rgba(251,146,60,.15); color: #fb923c; }
  .tag-needs-approval { background: rgba(234,179,8,.12); color: #facc15; }
  .tag-debug { background: rgba(148,163,184,.1); color: #94a3b8; }
  .tag-docs { background: rgba(52,211,153,.1); color: #34d399; }
  .tag-release { background: rgba(59,130,246,.1); color: #60a5fa; }
  .tag-ui { background: rgba(192,132,252,.1); color: #c084fc; }

  /* ── Empty state ────────────────────────────────── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; }

  /* ── Safety Rules ───────────────────────────────── */
  .safety-section {
    max-width: 1400px; margin: 28px auto 0;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 24px;
  }
  .safety-section h3 { font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .safety-section ul { list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 6px; }
  .safety-section li { font-size: 0.82rem; color: var(--text-muted); padding: 4px 8px; border-left: 2px solid var(--accent-pink); }

  /* ── Loading ────────────────────────────────────── */
  .loading {
    text-align: center; padding: 80px 20px; color: var(--text-muted);
  }
  .loading .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ─────────────────────────────────── */
  @media (max-width: 800px) {
    body { padding: 12px; }
    .header { flex-direction: column; align-items: flex-start; }
    .cat-header .desc { display: none; }
    .tool-table { font-size: 0.78rem; }
    .tool-number { width: 32px; min-width: 32px; }
    .tool-name { min-width: 120px; }
    .stat-card .num { font-size: 1.2rem; }
  }
  @media (max-width: 600px) {
    .tool-table th, .tool-table td { padding: 6px 4px; }
    .tool-type { display: none; }
    .tool-tags { min-width: auto; }
    .cat-header { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-left">
    <div class="header-logo"><img src="icon.png" alt="ToolCase" style="width:48px;height:48px;border-radius:12px;display:block"></div>
    <div>
      <h1>ToolCase Dashboard</h1>
      <div class="sub">Code Improvement Toolkit · SmokerGreenOG · <span id="version">v5.4.0</span></div>
    </div>
  </div>
  <div class="header-right">
    <a href="#" onclick="expandAll()" title="Expand all" data-i18n-key="expand_all">📂 Expand All</a>
    <a href="#" onclick="collapseAll()" title="Collapse all" data-i18n-key="collapse_all">📁 Collapse All</a>
    <a href="#" onclick="resetFilters()" title="Reset" data-i18n-key="reset">🔄 Reset</a>
    <select id="langSelect" onchange="switchLang(this.value)" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:6px 10px;font-size:0.82rem;cursor:pointer;outline:none">
      <option value="en">🇬🇧 English</option>
      <option value="nl">🇳🇱 Nederlands</option>
      <option value="de">🇩🇪 Deutsch</option>
    </select>
  </div>
</div>

<!-- ═══ STATS BAR ═══ -->
<div class="stats-bar" id="statsBar"></div>

<!-- ═══ CONTROLS ═══ -->
<div class="controls">
  <input type="text" id="searchInput" placeholder="🔍 Zoek op toolnaam, tag of beschrijving..." oninput="render()">
  <select id="catFilter" onchange="render()">
    <option value="all">Alle categorieën</option>
  </select>
  <select id="riskFilter" onchange="render()">
    <option value="all">All risks</option>
    <option value="Low">🟢 Low</option>
    <option value="Medium">🟡 Medium</option>
    <option value="High">🔴 High</option>
  </select>
  <select id="tagFilter" onchange="render()">
    <option value="all">All tags</option>
  </select>
  <span class="badge-count" id="resultCount"></span>
</div>

<!-- ═══ CATEGORIES ═══ -->
<div class="categories" id="categories"></div>

<!-- ═══ SAFETY RULES ═══ -->
<div class="safety-section" id="safetySection">
  <h3 id="safetyHeading">🔒 Safety Rules</h3>
  <ul id="safetyList"></ul>
</div>

<script>
// ─── i18n ──────────────────────────────────────────────
const LANG_STR = {
  en: {
    expand_all:"📂 Expand All", collapse_all:"📁 Collapse All", reset:"🔄 Reset",
    total_tools:"Total Tools", core:"Core", readonly:"Read-only", needs_approval:"Needs Approval",
    high_risk:"High Risk", categories_lbl:"Categories",
    all_categories:"All categories", all_risks:"All risks", all_tags:"All tags",
    search_placeholder:"🔍 Search by tool, tag or description...",
    tools_visible:"{n} tools visible", no_tools_found:"No tools found matching your filters.",
    try_reset:"Try different filters or reset.",
    could_not_load:"Could not load tools_config.json.",
    safety_heading:"🔒 Safety Rules",
    tool_type:"Type", tool_risk:"Risk", tool_tags:"Tags", tool_desc:"What it does",
    no_results:"🔍 No tools found.",
  },
  nl: {
    expand_all:"📂 Uitklappen", collapse_all:"📁 Inklappen", reset:"🔄 Reset",
    total_tools:"Totaal Tools", core:"Core", readonly:"Read-only", needs_approval:"Goedkeuring nodig",
    high_risk:"Hoog Risico", categories_lbl:"Categorieën",
    all_categories:"Alle categorieën", all_risks:"Alle risico's", all_tags:"Alle tags",
    search_placeholder:"🔍 Zoek op tool, tag of beschrijving...",
    tools_visible:"{n} tools zichtbaar", no_tools_found:"Geen tools gevonden die voldoen aan de filters.",
    try_reset:"Probeer andere filters of reset.",
    could_not_load:"Kon tools_config.json niet laden.",
    safety_heading:"🔒 Veiligheidsregels",
    tool_type:"Type", tool_risk:"Risk", tool_tags:"Tags", tool_desc:"Wat het doet",
    no_results:"🔍 Geen tools gevonden.",
  },
  de: {
    expand_all:"📂 Alle ausklappen", collapse_all:"📁 Alle einklappen", reset:"🔄 Zurücksetzen",
    total_tools:"Werkzeuge insgesamt", core:"Kern", readonly:"Schreibgeschützt", needs_approval:"Genehmigung erforderlich",
    high_risk:"Hohes Risiko", categories_lbl:"Kategorien",
    all_categories:"Alle Kategorien", all_risks:"Alle Risiken", all_tags:"Alle Tags",
    search_placeholder:"🔍 Suche nach Werkzeugnamen, Tags oder Beschreibung...",
    tools_visible:"{n} Werkzeuge sichtbar", no_tools_found:"Keine Werkzeuge gefunden, die Ihren Filtern entsprechen.",
    try_reset:"Versuchen Sie andere Filter oder setzen Sie zurück.",
    could_not_load:"Konnte tools_config.json nicht laden.",
    safety_heading:"🔒 Sicherheitsregeln",
    tool_type:"Typ", tool_risk:"Risiko", tool_tags:"Tags", tool_desc:"Was es tut",
    no_results:"🔍 Keine Werkzeuge gefunden.",
  },
};

let lang = localStorage.getItem('toolcase_lang') || 'en';

function t(key, vars) {
  let s = (LANG_STR[lang] && LANG_STR[lang][key]) || LANG_STR['en'][key] || key;
  if (vars) for (const [k,v] of Object.entries(vars)) s = s.replace('{'+k+'}', v);
  return s;
}

function switchLang(code) {
  lang = code;
  localStorage.setItem('toolcase_lang', code);
  // Update UI labels from HTML templates
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  render();
}

// ─── Data Loading ──────────────────────────────────────
let config = null;

async function load() {
  // Apply i18n to HTML template markers
  document.querySelectorAll('[data-i18n-key]').forEach(el => {
    el.textContent = t(el.dataset.i18nKey);
  });

  try {
    const resp = await fetch('tools_config.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    config = await resp.json();
    document.getElementById('version').textContent = 'v' + config.__meta.version;
    document.getElementById('langSelect').value = lang;
    initFilters();
    render();
  } catch(e) {
    document.getElementById('categories').innerHTML =
      `<div class="empty-state"><div class="big">⚠️</div><p>${t('could_not_load')}</p><p style="font-size:0.82rem;color:var(--text-dim);margin-top:8px">${e.message}</p></div>`;
  }
}

// ─── Filter Init ───────────────────────────────────────
function initFilters() {
  const tagSet = new Set();
  config.tools.forEach(t => t.tags.forEach(tg => tagSet.add(tg)));
  const tagSel = document.getElementById('tagFilter');
  tagSel.innerHTML = `<option value="all">${t('all_tags')}</option>`;
  [...tagSet].sort().forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    tagSel.appendChild(o);
  });
  const catSel = document.getElementById('catFilter');
  catSel.innerHTML = `<option value="all">${t('all_categories')}</option>`;
  config.categories.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.icon + ' ' + c.name;
    catSel.appendChild(o);
  });
  // Safety rules
  const list = document.getElementById('safetyList');
  list.innerHTML = '';
  config.safety_rules.forEach(r => {
    const li = document.createElement('li');
    li.textContent = r;
    list.appendChild(li);
  });
}

// ─── Rendering ─────────────────────────────────────────
function render() {
  if (!config) return;
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const catId = document.getElementById('catFilter').value;
  const risk = document.getElementById('riskFilter').value;
  const tag = document.getElementById('tagFilter').value;

  // Rebuild select placeholders on every render (language may have changed)
  document.querySelectorAll('#catFilter option, #tagFilter option, #riskFilter option').forEach(o => {
    if (o.value === 'all') {
      if (o.parentElement.id === 'catFilter') o.textContent = t('all_categories');
      else if (o.parentElement.id === 'tagFilter') o.textContent = t('all_tags');
      else if (o.parentElement.id === 'riskFilter') {
        if (o.value === 'all') o.textContent = t('all_risks');
      }
    }
  });

  // Update placeholders
  document.getElementById('searchInput').placeholder = t('search_placeholder');
  document.getElementById('safetyHeading').textContent = t('safety_heading');

  // Compute stats
  const all = config.tools;
  const core = all.filter(t => t.tags.includes('Core'));
  const ro = all.filter(t => t.read_only);
  const na = all.filter(t => t.needs_approval);
  const hr = all.filter(t => t.risk === 'High');

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card purple"><div class="num">${all.length}</div><div class="label">${t('total_tools')}</div></div>
    <div class="stat-card cyan"><div class="num">${core.length}</div><div class="label">${t('core')}</div></div>
    <div class="stat-card green"><div class="num">${ro.length}</div><div class="label">${t('readonly')}</div></div>
    <div class="stat-card yellow"><div class="num">${na.length}</div><div class="label">${t('needs_approval')}</div></div>
    <div class="stat-card red"><div class="num">${hr.length}</div><div class="label">${t('high_risk')}</div></div>
    <div class="stat-card pink"><div class="num">${config.categories.length}</div><div class="label">${t('categories_lbl')}</div></div>
  `;

  // Filter & render categories
  const container = document.getElementById('categories');
  let totalVisible = 0;
  let html = '';

  config.categories.forEach(cat => {
    const tools = cat.tools
      .map(name => config.tools.find(t => t.name === name))
      .filter(Boolean);

    const filtered = tools.filter(t => {
      if (risk !== 'all' && t.risk !== risk) return false;
      if (tag !== 'all' && !t.tags.includes(tag)) return false;
      if (q) {
        const haystack = (t.name + ' ' + t.description + ' ' + t.tags.join(' ') + ' ' + t.type).toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });

    if (catId !== 'all' && cat.id !== catId) {
      // Still visible? Only if this category is selected but maybe hidden by other filters
      if (catId === cat.id && filtered.length === 0) {
        // show empty
      } else if (catId !== cat.id) return;
    }

    totalVisible += filtered.length;

    const rows = filtered.map(t => {
      const riskClass = 'risk-' + t.risk.toLowerCase();
      const riskLabel = {'Low':'🟢 Low','Medium':'🟡 Medium','High':'🔴 High'}[t.risk] || t.risk;
      const tagsHtml = t.tags.map(tg => {
        const cls = 'tag-' + tg.toLowerCase().replace(/\s+/g, '-');
        return `<span class="badge ${cls}">${tg}</span>`;
      }).join('');

      return `<tr>
        <td class="tool-number">${t.id}</td>
        <td class="tool-name"><code>${t.name}</code></td>
        <td class="tool-type">${t.type}</td>
        <td><span class="badge ${riskClass}">${riskLabel}</span></td>
        <td class="tool-tags">${tagsHtml}</td>
        <td class="tool-desc">${t.description}</td>
      </tr>`;
    }).join('');

    if (filtered.length > 0 || (catId === cat.id && filtered.length === 0)) {
      html += `<div class="cat-card ${filtered.length === 0 ? 'collapsed' : ''}">
        <div class="cat-header" onclick="toggleCat(this)">
          <span class="icon">${cat.icon}</span>
          <span class="name">${cat.name}</span>
          <span class="desc">${cat.description}</span>
          <span class="count">${filtered.length} / ${tools.length}</span>
          <span class="arrow">▼</span>
        </div>
        <div class="cat-body">
          ${filtered.length > 0 ? `<table class="tool-table">
            <thead><tr>
              <th style="width:48px">#</th>
              <th style="min-width:180px">Tool</th>
              <th style="min-width:60px">Type</th>
              <th style="min-width:70px">Risk</th>
              <th style="min-width:100px">${t('tool_tags')}</th>
              <th>${t('tool_desc')}</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>` : `<div class="empty-state" style="padding:24px"><p>${t('no_tools_found')}</p></div>`}
        </div>
      </div>`;
    }
  });

  if (!html) {
    html = `<div class="empty-state"><div class="big">🔍</div><p>${t('no_results')}</p><p style="font-size:0.82rem;color:var(--text-dim);margin-top:8px">${t('try_reset')}</p></div>`;
  }
  container.innerHTML = html;
  document.getElementById('resultCount').textContent = t('tools_visible', {n: totalVisible});

  // Init collapse states from URL hash
  if (window.location.hash) {
    const id = window.location.hash.slice(1);
    const el = document.querySelector(`[data-cat-id="${id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  }
}

// ─── Interactive ───────────────────────────────────────
function toggleCat(header) {
  const card = header.closest('.cat-card');
  card.classList.toggle('collapsed');
  header.classList.toggle('collapsed');
}

function expandAll() {
  document.querySelectorAll('.cat-card.collapsed').forEach(c => {
    c.classList.remove('collapsed');
    c.querySelector('.cat-header')?.classList.remove('collapsed');
  });
}

function collapseAll() {
  document.querySelectorAll('.cat-card:not(.collapsed)').forEach(c => {
    c.classList.add('collapsed');
    c.querySelector('.cat-header')?.classList.add('collapsed');
  });
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('catFilter').value = 'all';
  document.getElementById('riskFilter').value = 'all';
  document.getElementById('tagFilter').value = 'all';
  render();
}

// ─── Start ─────────────────────────────────────────────
load();
</script>
</body>
</html>
